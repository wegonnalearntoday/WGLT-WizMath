<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Math - Tutor</title>
  </head>

  <body style="text-align:center; padding:0; border:0; margin:0;">
    <canvas id="unity-canvas" width="960" height="600" tabindex="-1"
      style="width:960px; height:600px; background:#231F20"></canvas>

    <script src="Build/WGLT-WizMath.loader.js"></script>
    <script>
      // Mobile: fill screen
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);

        var mCanvas = document.querySelector("#unity-canvas");
        mCanvas.style.width = "100%";
        mCanvas.style.height = "100%";
        mCanvas.style.position = "fixed";
        document.body.style.textAlign = "left";
      }

      var canvas = document.querySelector("#unity-canvas");

      var config = {
        dataUrl: "Build/WGLT-WizMath.data.br",
        frameworkUrl: "Build/WGLT-WizMath.framework.js.br",
        codeUrl: "Build/WGLT-WizMath.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "WGLT",
        productName: "Math - Tutor",
        productVersion: "1.0"
      };

      // Create Unity instance with progress callback
      createUnityInstance(
        canvas,
        config,
        function (progress) {
          // progress is 0..1
          var percent = Math.max(0, Math.min(100, Math.floor(progress * 100)));

          if (window.parent) {
            window.parent.postMessage({ type: "WGLT_PROGRESS", value: percent }, "*");
          }
        }
      )
      .then(function (unityInstance) {
        // Unity is ready
        if (window.parent) {
          window.parent.postMessage({ type: "WGLT_READY" }, "*");
        }
      })
      .catch(function (message) {
        // Optional: notify Wix that something went wrong
        if (window.parent) {
          window.parent.postMessage({ type: "WGLT_ERROR", message: String(message) }, "*");
        }
        alert(message);
      });
    </script>
  </body>
</html>
