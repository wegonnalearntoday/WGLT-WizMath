<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Math - Tutor</title>
  </head>

  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <canvas id="unity-canvas" width="960" height="600" tabindex="-1"
      style="width: 960px; height: 600px; background: #231F20"></canvas>

    <script src="Build/WGLT-WizMath.loader.js"></script>

    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";
      }

      var canvasEl = document.querySelector("#unity-canvas");

      createUnityInstance(canvasEl, {
        dataUrl: "Build/WGLT-WizMath.data",
        frameworkUrl: "Build/WGLT-WizMath.framework.js",
        codeUrl: "Build/WGLT-WizMath.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "WGLT",
        productName: "Math - Tutor",
        productVersion: "1.0"
      })

      .then((unityInstance) => {

        // Notify Wix loader that Unity finished loading
        if (window.parent) {
          window.parent.postMessage({ type: "WGLT_READY" }, "*");
        }

      })

      .catch((message) => {
        alert(message);
      });

    </script>

  </body>
</html>
